services:
  # ── Backend (FastAPI) ────────────────────────────────────────────────────────
  - type: web
    name: nest-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false          # set in Render dashboard
      - key: SECRET_KEY
        generateValue: true  # Render auto-generates a secure random string
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false          # set to ["https://nest-app.onrender.com"] after frontend deploys
      - key: FRONTEND_URL
        sync: false          # set to https://nest-app.onrender.com
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false

  # ── Frontend (React + Vite) ──────────────────────────────────────────────────
  - type: web
    name: nest-app
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    plan: free
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false          # set to https://nest-api.onrender.com (no trailing slash)
      - key: VITE_WS_URL
        sync: false          # set to wss://nest-api.onrender.com
