services:
  # ── Frontend (React + Vite static site — free) ───────────────────────────────
  # Backend is deployed separately on Railway (free tier)
  - type: web
    name: nest-app
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # Set these to your Railway backend URL after deploying the backend
      # e.g. https://nest-api-production.up.railway.app
      - key: VITE_API_URL
        sync: false
      - key: VITE_WS_URL
        sync: false
