<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="#6366f1"/>

  <!-- Nest bowl body (darker indigo) -->
  <path d="M5 23 Q16 13 27 23 L25 29 Q16 31.5 7 29 Z" fill="#4338ca"/>

  <!-- Woven twig lines (lighter) -->
  <path d="M7 24.5 Q16 18.5 25 24.5" stroke="#818cf8" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <path d="M8.5 27.5 Q16 23 23.5 27.5" stroke="#818cf8" stroke-width="1.1" stroke-linecap="round" fill="none"/>
  <!-- Cross-weave -->
  <path d="M11.5 17.5 Q10.5 22 11 29" stroke="#818cf8" stroke-width="1" stroke-linecap="round" fill="none" opacity="0.7"/>
  <path d="M20.5 17.5 Q21.5 22 21 29" stroke="#818cf8" stroke-width="1" stroke-linecap="round" fill="none" opacity="0.7"/>

  <!-- Egg (sits in bowl) -->
  <ellipse cx="16" cy="19.5" rx="4.2" ry="5.2" fill="#f8fafc"/>
  <!-- Egg shine -->
  <ellipse cx="14.5" cy="17" rx="1.3" ry="1.8" fill="white" opacity="0.45"/>
</svg>
